<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc" fill="none">
  <title id="title">BOX isometric guide map</title>
  <desc id="desc">An isometric base room for the Kyoto University Orienteering Club BOX. Interactive objects are layered separately in HTML, with a center curtain track dividing the room.</desc>
  <defs>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5ead4"/>
      <stop offset=".56" stop-color="#e8dbc0"/>
      <stop offset="1" stop-color="#d5c49f"/>
    </linearGradient>
    <linearGradient id="backWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#eadfc8"/>
    </linearGradient>
    <linearGradient id="rightWall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eee1ca"/>
      <stop offset="1" stop-color="#cfb98f"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#aee7ef"/>
      <stop offset="1" stop-color="#386b75"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#141824" flood-opacity=".24"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#121620" flood-opacity=".2"/>
    </filter>
    <style>
      .line{fill:none;stroke:#5f5649;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .thin{fill:none;stroke:#7a6c5a;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .label{font-family:"Yu Gothic","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;font-weight:800;letter-spacing:.04em;fill:#2b2c35}
      .small{font-size:23px}
      .med{font-size:34px}
      .hot{stroke:#f5fbff;stroke-width:7}
      .mapLine{fill:none;stroke:#78b87a;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <rect width="1600" height="900" fill="#242943"/>
  <path d="M0 694 C170 610 293 661 454 605 C639 542 748 609 938 550 C1176 477 1353 552 1600 448 L1600 900 L0 900 Z" fill="#192032" opacity=".55"/>
  <path d="M88 800 C319 743 463 774 705 724 C975 669 1154 708 1511 622" class="thin" opacity=".38"/>
  <path d="M121 839 C374 803 580 811 820 774 C1084 732 1291 756 1515 706" class="thin" opacity=".28"/>

  <g filter="url(#shadow)">
    <path d="M278 148 L1248 148 L1348 262 L376 262 Z" fill="#fff3d4"/>
    <path d="M1248 148 L1348 262 L1424 690 L1328 587 Z" fill="#d8c49e"/>
    <path d="M376 262 L1348 262 L1424 690 L199 690 Z" fill="#e7d7b7"/>
    <path d="M278 148 L376 262 L199 690 L129 596 L188 292 Z" fill="#e1cfaa"/>
    <path d="M278 148 L1248 148 L1348 262 L1424 690 L199 690 L129 596 L188 292 Z" class="line"/>
    <path d="M376 262 L1348 262" class="line"/>
    <path d="M376 262 L199 690" class="line"/>
    <path d="M1348 262 L1424 690" class="line"/>
  </g>

  <g opacity=".34">
    <path d="M409 319 L1268 319" class="thin"/>
    <path d="M372 397 L1291 397" class="thin"/>
    <path d="M333 481 L1315 481" class="thin"/>
    <path d="M293 575 L1344 575" class="thin"/>
    <path d="M489 267 L330 690" class="thin"/>
    <path d="M690 267 L574 690" class="thin"/>
    <path d="M883 267 L830 690" class="thin"/>
    <path d="M1078 267 L1112 690" class="thin"/>
  </g>

  <g opacity=".7">
    <path d="M376 262 L792 262 L780 690 L199 690 Z" fill="#fff0c8" opacity=".43"/>
    <path d="M792 262 L1348 262 L1424 690 L780 690 Z" fill="#cceade" opacity=".36"/>
    <path d="M792 262 C787 357 783 510 780 690" stroke="#fff9df" stroke-width="38" stroke-linecap="round" opacity=".4"/>
    <path d="M792 262 C787 357 783 510 780 690" stroke="#55655f" stroke-width="12" stroke-linecap="round" opacity=".42"/>
    <path d="M792 262 C787 357 783 510 780 690" stroke="#f5fff0" stroke-width="8" stroke-linecap="round" stroke-dasharray="18 16" opacity=".78"/>
    <path d="M742 152 L792 262 L853 152" stroke="#55655f" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity=".68"/>
    <path d="M713 150 H889" stroke="#55655f" stroke-width="10" stroke-linecap="round" opacity=".68"/>
    <path d="M751 176 H854" stroke="#f5fff0" stroke-width="5" stroke-linecap="round" stroke-dasharray="14 12" opacity=".65"/>
  </g>

</svg>
